<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>Web Marker</title>
  <style>
    /* ── Reset & Base ──────────────────────────────── */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 20px;
      overflow: hidden;
    }

    /* ── Header ────────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #4f8cff, #a855f7, #ff3366);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    .header p {
      font-size: 11px;
      color: #7a7a9e;
      margin-top: 4px;
    }

    /* ── Toggle Button ─────────────────────────────── */
    .toggle-btn {
      display: block;
      width: 100%;
      padding: 12px 0;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      background: linear-gradient(135deg, #4f8cff, #3b6de0);
      color: #fff;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 16px rgba(79, 140, 255, 0.3);
    }

    .toggle-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(79, 140, 255, 0.45);
    }

    .toggle-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 10px rgba(79, 140, 255, 0.25);
    }

    .toggle-btn.active {
      background: linear-gradient(135deg, #ff3366, #e0294f);
      box-shadow: 0 4px 16px rgba(255, 51, 102, 0.3);
    }

    .toggle-btn.active:hover {
      box-shadow: 0 6px 20px rgba(255, 51, 102, 0.45);
    }

    /* ── Shortcuts Section ─────────────────────────── */
    .shortcuts {
      margin-top: 18px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 10px;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .shortcuts-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #7a7a9e;
      margin-bottom: 10px;
    }

    .shortcut-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
    }

    .shortcut-row + .shortcut-row {
      border-top: 1px solid rgba(255, 255, 255, 0.04);
    }

    .shortcut-label {
      font-size: 12px;
      color: #b0b0c8;
    }

    .shortcut-keys {
      display: flex;
      gap: 4px;
    }

    kbd {
      display: inline-block;
      padding: 2px 7px;
      font-size: 10px;
      font-family: 'Segoe UI', system-ui, monospace;
      font-weight: 600;
      color: #d0d0e8;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      line-height: 1.6;
    }

    /* ── Footer ────────────────────────────────────── */
    .footer {
      text-align: center;
      margin-top: 16px;
      font-size: 10px;
      color: #4a4a6a;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Web Marker</h1>
    <p>Draw &amp; annotate on any webpage</p>
  </div>

  <button id="toggleBtn" class="toggle-btn">Start Drawing</button>

  <div class="shortcuts">
    <div class="shortcuts-title">Keyboard Shortcuts</div>

    <div class="shortcut-row">
      <span class="shortcut-label">Undo</span>
      <span class="shortcut-keys"><kbd>Ctrl</kbd><kbd>Z</kbd></span>
    </div>
    <div class="shortcut-row">
      <span class="shortcut-label">Redo</span>
      <span class="shortcut-keys"><kbd>Ctrl</kbd><kbd>Y</kbd></span>
    </div>
    <div class="shortcut-row">
      <span class="shortcut-label">Side Panel</span>
      <span class="shortcut-keys"><kbd>Ctrl</kbd><kbd>Shift</kbd><kbd>X</kbd></span>
    </div>
    <div class="shortcut-row">
      <span class="shortcut-label">Deactivate</span>
      <span class="shortcut-keys"><kbd>Esc</kbd></span>
    </div>
    <div class="shortcut-row">
      <span class="shortcut-label">Switch Pages</span>
      <span class="shortcut-keys"><kbd>Alt</kbd><kbd>1</kbd>–<kbd>5</kbd></span>
    </div>
  </div>

  <div class="footer">v1.0.0</div>

  <script src="popup.js"></script>
</body>
</html>
